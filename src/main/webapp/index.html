<!DOCTYPE html>
<html lang=en>

<head>
	<meta charset="UTF-8">
	<link rel="icon" href="assets/upf.png">
	<title> U </title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
	<link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
	<link rel="stylesheet" href="https://www.w3schools.com/lib/w3-theme-blue.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="css/style.css">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script>
		window.App = window.App || {};
		App.Errors = App.Errors || {};
	</script>
	<script src="js/LoginValidation.js"></script>
	<script src="js/RegisterValidation.js"></script>

	<script>
		App.init = function () {

			$.ajaxSetup({ cache: false });
			// Load initial content
			$('#navigation').load("Menu");
			$('#content').load("Content");
			$('#lcolumn').load("Profile");
			$('#rcolumn').load("NotFollowed");
			// Attach global events
			App.bindEvents();

		};

		App.bindEvents = function () {
			App.refreshFollowPanels = function (contentView) {
				if (contentView) {
					$('#content').load(contentView);
				}
				$('#rcolumn').load('NotFollowed');
				$('#lcolumn').load('Profile');
			};

			// Deal with menu clicks
			$(document).on("click", ".menu", function (event) {
				event.preventDefault();
				$('#content').load($(this).attr('href'));
				App.stack();
			});
			/* Edit profile */
			$(document).on("click", ".editUser", function(event) {
				event.preventDefault();
				$('#content').load('EditProfile');
			});
			// Deal with form submission via AJAX
			$(document).on("submit", "form", function (event) {
				if ($(this).attr("id") === "tweetForm") {
					return;
				}
				if ($(this).attr("id") === "editProfileForm") {
					return;
				}
				// sovles the bug of passwore fiels not being validated
				if (event.isDefaultPrevented() || !this.checkValidity()) {
					return;
				}
				event.preventDefault();
				const form = this;
				const data = new FormData(form);
				$.ajax({
					type: 'POST',
					enctype: 'multipart/form-data',
					url: $(form).attr('action'),
					data: data,
					processData: false,
					contentType: false
				}).done(function (html) {
					$('#navigation').load("Menu");
					$("#content").html(html);
				});
			});
			/* Save edited profile */
			$(document).on("submit", "#editProfileForm", function(event) {
				event.preventDefault();
				if (!this.checkValidity()) {
					this.reportValidity();
					return;
				}
				const form = this;
				const data = new FormData(form);
				$.ajax({
					type: 'POST',
					enctype: 'multipart/form-data',
					url: $(form).attr('action'),
					data: data,
					processData: false,
					contentType: false
				}).done(function(html) {
					$('#content').html(html);
					$('#lcolumn').load('Profile');
				});
			});
			/* Add tweet */
			$(document).on("submit", "#tweetForm", function(event) {
				event.preventDefault();
				const content = $("#tweetContent").val().trim();
				if (!content) {
					$("#tweetContent")[0].setCustomValidity("Tweet content cannot be empty.");
					$("#tweetContent")[0].reportValidity();
					return;
				}
				$("#tweetContent")[0].setCustomValidity("");
				$.ajax({
					type: 'POST',
					url: 'AddTweet',
					data: { content: content }
				}).done(function() {
					$("#tweetContent").val('');
					$("#iterator").load('Tweets');
				});
			});
			/* Follow user */
			$(document).on("click", ".followUser", function(event) {
				const userId = $(this).parent().attr("id");
				$.post("Follow", { id: userId }).done(function() {
					App.refreshFollowPanels("Followed");
				});
				event.preventDefault();
			});
			/* UnFollow user */
			$(document).on("click", ".unfollowUser", function(event) {
				const userId = $(this).parent().attr("id");
				$.post("Unfollow", { id: userId }).done(function() {
					App.refreshFollowPanels("Followed");
				});
				event.preventDefault();
			});
			/* Show followed user profile */
			$(document).on("click", ".userInfo", function(event) {
				const userId = $(this).parent().attr("id");
				$('#content').load('BuddyProfile?id=' + userId);
				event.preventDefault();
			});
			/* Delete tweet */
			$(document).on("click", ".delTweet", function(event) {
				const tweetId = $(this).data("tweet-id") || $(this).parent().attr("id");
				if (!tweetId) {
					event.preventDefault();
					return;
				}
				const refreshView = $(this).data("refresh") || "Tweets";
				const refreshUrl = $(this).data("refresh-url") || null;
				$.post("DelTweet", {
					id : tweetId
				}, function(event) {
					if (refreshUrl) {
						$('#content').load(refreshUrl);
					} else if (refreshView === "Tweets") {
						$("#iterator").load('Tweets');
					} else {
						$('#content').load(refreshView);
					}
				});
				event.preventDefault();
			});
			/* Feature tweet for professionals */
			$(document).on("click", ".featureTweet", function(event) {
				const tweetId = $(this).closest(".w3-container").attr("id");
				$.post("FeatureTweet", { tweetId: tweetId }).done(function() {
					$("#iterator").load('Tweets');
					$("#lcolumn").load('Profile');
				});
				event.preventDefault();
			});
			/* Like/Unlike tweet */
			$(document).on("click", ".likeTweet", function(event) {
				const $card = $(this).closest(".w3-container");
				const tweetId = $card.attr("id");
				const $button = $(this);
				const endpoint = $button.hasClass("w3-green") ? "DelLike" : "AddLike";
				$.post(endpoint, { tweetId: tweetId }).done(function(data, status, xhr) {
					const likeCount = parseInt(xhr.getResponseHeader("X-Like-Count") || "0", 10);
					const liked = (xhr.getResponseHeader("X-Liked") || "false") === "true";
					$button.removeClass("w3-theme w3-green").addClass(liked ? "w3-green" : "w3-theme");
					$button.find(".likeCount").text("(" + likeCount + ")");
				}).fail(function() {
					console.error("Failed to toggle like");
				});
				event.preventDefault();
			});
			/* Load comments */
			$(document).on("click", ".commentTweet", function(event) {
				const tweetId = $(this).closest(".w3-container").attr("id");
				const $section = $(this).closest(".w3-container").find(".tweetCommentsSection[data-tweet-id='" + tweetId + "']");
				$section.load("GetReplies?tweetId=" + tweetId);
				event.preventDefault();
			});
			/* Add comment */
			$(document).on("click", ".submitComment", function(event) {
				const $card = $(this).closest(".w3-container");
				const tweetId = $card.attr("id");
				const $textarea = $(this).parent().find(".commentInput");
				const content = $textarea.val().trim();
				if (!content) {
					alert("Comment cannot be empty");
					return;
				}
				$.post("AddReply", { tweetId: tweetId, content: content }).done(function(data, status, xhr) {
					const commentCount = parseInt(xhr.getResponseHeader("X-Reply-Count") || xhr.getResponseHeader("X-Comment-Count") || "0", 10);
					$textarea.val('');
					$card.find(".commentCount").text("(" + commentCount + ")");
					$(".tweetCommentsSection[data-tweet-id='" + tweetId + "']").load('GetReplies?tweetId=' + tweetId);
				}).fail(function() {
					console.error("Failed to add comment");
				});
				event.preventDefault();
			});
			/* Delete comment */
			$(document).on("click", ".delComment", function(event) {
				const tweetId = $(this).data("tweet-id");
				const commentId = $(this).data("comment-id");
				if (!tweetId || !commentId) {
					event.preventDefault();
					return;
				}
				$.post("DelReply", { replyId: commentId }).done(function(data, status, xhr) {
					const commentCount = parseInt(xhr.getResponseHeader("X-Reply-Count") || xhr.getResponseHeader("X-Comment-Count") || "0", 10);
					const $tweetCard = $("#" + tweetId + ".w3-container");
					$tweetCard.find(".commentCount").text("(" + commentCount + ")");
					$(".tweetCommentsSection[data-tweet-id='" + tweetId + "']").load('GetReplies?tweetId=' + tweetId);
				}).fail(function() {
					console.error("Failed to delete comment");
				});
				event.preventDefault();
			});

		};

		App.stack = function () {
			$("#stack").toggleClass("w3-show");
		};

		// Ensure `App.init` runs correctly
		$(document).ready(function () {
			App.init();
		});

	</script>

</head>

<body>

	<!-- Begin Navigation -->
	<div class="w3-theme w3-top" id="navigation"> </div>
	<!-- End Navigation -->

	<!-- Begin Content -->
	<div class="w3-row-padding" style="margin-top: 50px;margin-bottom: 75px">

		<!-- Left Column -->
		<div class="w3-container w3-col m3 w3-hide-small">
			<div id="lcolumn"> </div>
		</div>
		<!-- Middle Column -->
		<div class="w3-container w3-col m6">
			<div id="content"> </div>
		</div>
		<!-- Right Column -->
		<div class="w3-container w3-col m3 w3-hide-small">
			<div id="rcolumn"> </div>
		</div>

	</div>
	<!-- End Content -->
	<!-- Footer -->
	<footer class="w3-container w3-theme w3-bottom">
		<p>Pompeu Fabra University @2026</p>
	</footer>

</body>

</html>
